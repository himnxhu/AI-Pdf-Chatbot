services:
  app:
    build:
      context: .
    container_name: ai-pdf-chatbot-app
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      OLLAMA_NUM_GPU: ${OLLAMA_NUM_GPU:-0}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ai-pdf-chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
